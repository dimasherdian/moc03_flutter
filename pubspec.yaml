name: moc03_flutter
description: "A new Flutter project."

# Prevent accidental publish to pub.dev
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

# Project dependencies
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0

# Development tools and packages
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# Flutter-specific configurations
flutter:
  uses-material-design: true
  # To add assets or fonts, list them here:
  # assets:
  #   - assets/

# Launcher icon generation configurations
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
